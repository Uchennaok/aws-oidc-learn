name: Vault OIDC Test

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Pull secret from Vault
        id: vault
        uses: hashicorp/vault-action@v3
        with:
          url: https://vault.sf-test-andres.com
          method: jwt
          path: jwt
          role: github-oidc-role
          secrets: |
            secret/data/for-kubernetes/database password | DB_PASSWORD ;
            secret/data/for-kubernetes/database username | DB_USERNAME

      - name: Validate
        run: |
          [ -n "$DB_USERNAME" ] || { echo "Missing username"; exit 1; }
          [ -n "$DB_PASSWORD" ] || { echo "Missing password"; exit 1; }
          echo "Success"
          echo "Username length: ${#DB_USERNAME}"
          echo "Password length: ${#DB_PASSWORD}"
        env:
          DB_USERNAME: ${{ steps.vault.outputs.DB_USERNAME }}
          DB_PASSWORD: ${{ steps.vault.outputs.DB_PASSWORD }}